name: CI Build

on:
  push:
    branches:
      - main
      - testing
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { os: linux, arch: amd64 }
          - { os: linux, arch: arm64 }
          - { os: darwin, arch: amd64 }
          - { os: darwin, arch: arm64 }
          - { os: windows, arch: amd64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.9

      - name: Build
        run: |
          mkdir -p dist
          TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS 2>/dev/null || echo "")
          go build -v -trimpath -o dist/sing-box${{ matrix.os == 'windows' && '.exe' || '' }} \
            -tags "$TAGS" \
            -ldflags "-s -w -buildid=" \
            ./cmd/sing-box
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}

      - name: Package
        run: |
          cd dist
          DIR_NAME="sing-box-${{ github.sha }}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "${DIR_NAME}"
          cp ../LICENSE "${DIR_NAME}"
          if [ '${{ matrix.os }}' = 'windows' ]; then
            cp "sing-box.exe" "${DIR_NAME}/"
            zip -r "${DIR_NAME}.zip" "${DIR_NAME}"
          else
            cp "sing-box" "${DIR_NAME}/"
            tar -czvf "${DIR_NAME}.tar.gz" "${DIR_NAME}"
          fi
          rm -r "${DIR_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
